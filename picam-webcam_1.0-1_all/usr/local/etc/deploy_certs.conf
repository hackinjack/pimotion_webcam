# /usr/local/etc/deploy_certs.conf

# Global Acme/Cert Variables
DOMAIN="*.thirteenb.mywire.org"
ECCDOMAIN="*.thirteenb.mywire.org_ecc"
CERT_DIR="/home/jfk/.acme.sh/${ECCDOMAIN}"
ACME_SH_BIN="/home/jfk/.acme.sh/acme.sh" # Update this if acme.sh is in /home/jfk/

# Targets Array
# Format: "type|username|hostname_or_ip|service_or_command"
# Types available:
#   linux    -> pushes to /tmp, securely installs to /etc/ssl/private/, restarts systemd service
#   asus     -> pushes directly to /etc/cert.pem and /etc/key.pem, runs service command
#   mikrotik -> sets ROUTER_OS vars, runs acme.sh --deploy-hook routeros
TARGETS=(
    "linux|jfk|picam1.thirteenb.mywire.org|webcam"
    "linux|jfk|pi5.thirteenb.mywire.org|telegraf"
    "linux|jfk|fr24.thirteenb.mywire.org|telegraf"
    "asus|admin|zenwifi|restart_httpd"
    "mikrotik|admin|mikrotik|routeros"
)
